<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<header class="site-header">
  <div class="site-header-left">
    <a href="./index.html" class="site-logo" id="site-logo"><span>Blog</span></a>
  </div>
  <div class="site-header-right">
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
    <button class="btn btn-ghost" id="request-btn">Request Access</button>
    <button class="btn btn-primary" id="login-btn">Sign In</button>
    <div class="user-menu-wrap hidden" id="user-menu-wrap">
      <button class="user-avatar" id="user-avatar" aria-label="User menu">?</button>
      <div class="user-dropdown hidden" id="user-dropdown">
        <div class="user-dropdown-header">
          <div class="user-dropdown-avatar" id="dropdown-avatar">?</div>
          <div>
            <div class="user-dropdown-name" id="dropdown-name">—</div>
            <div class="user-dropdown-role" id="dropdown-role">Member</div>
          </div>
        </div>
        <div class="user-dropdown-body">
          <button id="change-pw-btn" onclick="openChangePwModal(false);document.getElementById('user-dropdown').classList.add('hidden')">
            <svg class="dd-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Change Password
          </button>
          <a href="admin.html" id="admin-link" class="hidden">
            <svg class="dd-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
            Admin Panel
          </a>
          <div class="divider"></div>
          <button id="logout-btn" class="dd-danger">
            <svg class="dd-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sign Out
          </button>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- ── Water Counter ────────────────────────────────────────── -->
<div class="water-counter">
  <svg class="drop" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2C12 2 5 10.4 5 15a7 7 0 0 0 14 0c0-4.6-7-13-7-13z"/></svg>
  <span id="water-amount" class="water-amount">...</span>
  <span>of water consumed running this site</span>
</div>

<!-- ── Hero ────────────────────────────────────────────────── -->
<section class="hero" id="hero">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-eyebrow">Welcome</div>
    <h1 class="hero-title" id="hero-title">My Blog</h1>
    <p class="hero-sub" id="hero-sub">A private space to share thoughts, stories, and moments.</p>
    <div class="hero-actions" id="hero-actions">
      <button class="btn btn-primary btn-lg" onclick="openRequestModal()" id="hero-request-btn">Request Access</button>
    </div>
  </div>
</section>

<!-- ── Feed ────────────────────────────────────────────────── -->
<main id="feed-container">
  <div style="padding:60px 24px;text-align:center;color:var(--text-muted)">Loading...</div>
</main>

<!-- ── Donate Bar ───────────────────────────────────────────── -->
<div class="donate-bar hidden" id="donate-bar">
  <span class="donate-msg">Feed my dog 🐕</span>
  <a class="donate-btn" href="#" target="_blank" rel="noopener">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    Send Venmo
  </a>
</div>

<!-- ── Site Footer ──────────────────────────────────────────── -->
<footer class="site-footer">
  <span id="footer-title"></span> · All rights reserved
</footer>

<!-- ── Post Overlay ─────────────────────────────────────────── -->
<div id="post-overlay" class="hidden" style="position:fixed;inset:0;z-index:150;overflow-y:auto;background:var(--bg)"></div>

<!-- ── Modal Backdrop ───────────────────────────────────────── -->
<div id="modal-backdrop" class="modal-backdrop hidden"></div>

<!-- ── Scripts ──────────────────────────────────────────────── -->
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
